name: build
run-name: Build openwrt packages
on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      targets:
        description: "Comma-separated list of targets to build"
        default: "x86/64,mediatek/filogic,octeon/generic"
        required: false

jobs:
  generate-matrix:
    runs-on: ubuntu-latest
    outputs:
      openwrt_versions: ${{ steps.set-matrix.outputs.versions }}
      packages: ${{ steps.set-packages.outputs.packages }}
      targets: ${{ steps.set-targets.outputs.targets }}
    steps:
      - uses: actions/checkout@v6
        with:
          path: "./feed"

      - name: Fetch OpenWrt versions
        id: set-matrix
        run: |
          VERSIONS_JSON=$(curl -sL https://downloads.openwrt.org/.versions.json)
          STABLE=$(echo "$VERSIONS_JSON" | jq -r '.stable_version // empty')
          OLDSTABLE=$(echo "$VERSIONS_JSON" | jq -r '.oldstable_version // empty')

          VERSIONS=()
          [ -n "$STABLE" ] && VERSIONS+=("\"$STABLE\"")
          [ -n "$OLDSTABLE" ] && VERSIONS+=("\"$OLDSTABLE\"")

          MATRIX_JSON="[$(IFS=,; echo "${VERSIONS[*]}")]"
          echo "versions=$MATRIX_JSON" >> $GITHUB_OUTPUT

      - name: Figure out Packages
        id: set-packages
        run: |
          PACKAGES=()
          for mk in $(find feed -mindepth 2 -maxdepth 3 -name Makefile); do
            pkg=$(basename $(dirname "$mk"))
            PACKAGES+=("\"$pkg\"")
          done
          PKGS_JSON="[$(IFS=,; echo "${PACKAGES[*]}")]"
          echo "packages=$PKGS_JSON" >> $GITHUB_OUTPUT

      - name: Resolve targets
        id: set-targets
        run: |
          INPUT="${{ inputs.targets || 'x86/64,mediatek/filogic,octeon/generic' }}"
          TARGETS_JSON='['
          FIRST=1
          IFS=',' read -ra TARGETS <<< "$INPUT"
          for target in "${TARGETS[@]}"; do
            target=$(echo "$target" | xargs)  # trim whitespace
            safe=$(echo "$target" | tr '/' '-')
            [[ $FIRST -ne 1 ]] && TARGETS_JSON="$TARGETS_JSON,"
            FIRST=0
            TARGETS_JSON="$TARGETS_JSON{\"target\":\"$target\",\"safe_target\":\"$safe\"}"
          done
          TARGETS_JSON="$TARGETS_JSON]"
          echo "targets=$TARGETS_JSON" >> $GITHUB_OUTPUT

  build:
    needs: generate-matrix
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        openwrt: ${{ fromJson(needs.generate-matrix.outputs.openwrt_versions) }}
        target: ${{ fromJson(needs.generate-matrix.outputs.targets) }}
        package: ${{ fromJson(needs.generate-matrix.outputs.packages) }}

    container:
      image: lochnair/openwrt-sdk-rust:${{ matrix.target.safe_target }}-${{ matrix.openwrt }}

    steps:
      - uses: actions/checkout@v6
        with:
          path: "./feed"

      - name: Build package
        run: |
          echo "src-link lochnair ${{ github.workspace }}/feed" >> feeds.conf.default
          ./scripts/feeds update lochnair
          ./scripts/feeds install -p lochnair -a
          ./scripts/feeds install -a
          make defconfig
          make package/${{ matrix.package }}/compile || \
          make package/${{ matrix.package }}/compile V=sc -j1

      - name: Archive packages
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: "package-${{ matrix.package }}-${{ matrix.openwrt }}-${{ matrix.target.safe_target }}"
          path: |
            bin/packages/**/lochnair/*.apk
            bin/packages/**/lochnair/*.ipk
